
services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: mysql-graduation
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: graduation_topic
      MYSQL_USER: graduation_user
      MYSQL_PASSWORD: graduation_pass
      TZ: Asia/Shanghai

    ports:
      - "3306:3306"
    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      # 初始化脚本（仅保留建表脚本；初始数据脚本已移除）
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - graduation-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graduation-backend
    restart: always
    ports:
      # 宿主机 9090 -> 容器内 9091（Spring Boot 实际监听 9091）
      - "9090:9091"
    environment:
      # 数据库连接配置（使用服务名）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: graduation_topic
      DB_USER: root
      DB_PASSWORD: root
      AI_TAG_API_KEY: gg-gcli-Gh4SeqClPIdbIMw6XpKcsFxJRPQQ8SK5TVChjdoOAmE
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRATION: 120
      # 管理员配置
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: 123456
      ADMIN_REAL_NAME: 系统管理员
      ADMIN_AUTO_CREATE: "true"
    volumes:
      # 日志目录
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - graduation-network
    healthcheck:
      # 健康检查必须访问容器内实际端口 9091
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graduation-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - graduation-network

volumes:
  mysql_data:
    driver: local

networks:
  graduation-network:
    driver: bridge


