# 生产环境配置
# 使用方式：java -jar -Dspring.profiles.active=prod app.jar

server:
  port: 9090
  # 允许内网访问（如果需要外网，通过 Nginx 反代，不建议直接暴露 8080）
  address: 0.0.0.0
  # 请求体大小限制（用于文件上传）
  max-http-post-size: 209715200  # 200MB

spring:
  datasource:
    # 生产环境数据库配置（请修改为实际地址）
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:graduation_topic}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池配置（生产环境建议调整）
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # SQL 初始化（生产环境建议使用迁移工具；此处用于避免“缺表导致接口异常”）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  jackson:
    time-zone: Asia/Shanghai

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 209715200  # 200MB
      max-request-size: 209715200  # 200MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # 生产环境使用日志记录 SQL
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted  # 逻辑删除字段（可选）

# JWT 配置（生产环境必须修改密钥）
# 注意：HS512 算法要求密钥至少 512 位（64 字节）
jwt:
  secret: ${JWT_SECRET:QxuhaiYhazhkrYbbJQwhvJd06GVWAq09YCC7NceNjsM2GDciiM30tClcrS2pD3+nDV2cIrQIVK0qnFJLqbCIRw==}
  expiration-minutes: ${JWT_EXPIRATION:120}

# 管理员账号配置（生产环境建议禁用自动创建或使用环境变量）
# 说明：
# - 你已经在数据库脚本中手动插入了 admin 账号
# - 因此这里关闭 auto-create，避免启动时再去自动创建
admin:
  username: admin
  password: 123456
  real-name: 系统管理员
  auto-create: false  # 关闭自动创建管理员账号

# 日志配置
logging:
  level:
    root: INFO
    com.example.graduation: DEBUG
  file:
    name: logs/graduation-backend.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# CORS 配置（生产环境必须配置具体域名）
# 多个域名用逗号分隔，例如：https://yourdomain.com,https://www.yourdomain.com
# 本地测试可以使用：http://localhost,http://localhost:5173
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173,http://localhost:80}

# 注意：如果使用 Nginx 反代，建议在 Nginx 层面处理 CORS，更高效

