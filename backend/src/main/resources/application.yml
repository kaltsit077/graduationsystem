server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/graduation_topic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # SQL 初始化（创建表结构等）
  # 注意：spring.sql.init 必须配置在 spring 下，而不是 spring.datasource 下
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      # 如需初始化演示数据，可启用 data-locations
      # data-locations: classpath:db/init-data.sql

  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  # JWT 密钥（64 字节，512 位，满足 HS512 算法要求）
  secret: "QxuhaiYhazhkrYbbJQwhvJd06GVWAq09YCC7NceNjsM2GDciiM30tClcrS2pD3+nDV2cIrQIVK0qnFJLqbCIRw=="
  expiration-minutes: 120

# 默认管理员账号配置
# - 若管理员登录报错“用户名或密码错误”，请确认数据库中已有 ADMIN 用户，或将 auto-create 改为 true 后重启后端以自动创建
admin:
  username: admin
  password: 123456
  real-name: 胡先生
  auto-create: false

# AI 标签抽取部分：从研究方向/兴趣描述中自动抽取关键词作为用户标签
#  enabled=false 时仍使用原有的按逗号/空格分词逻辑
ai:
  tag:
    enabled: true
    api-url: https://gcli.ggchan.dev/v1/chat/completions
    api-key: ${AI_TAG_API_KEY}
    model: gemini-2.5-pro
    timeout-ms: 300000

# 语义向量服务（本地 sentence-transformers / bge）
embedding:
  enabled: true
  base-url: http://localhost:8000

# 监控日志：定期清除（0=关闭，大于 0 表示每隔 N 小时清空一次日志文件）
monitor:
  log:
    clear-interval-hours: 1

# 文件上传：用于用户自定义背景图等静态资源
app:
  upload-dir: ./uploads
